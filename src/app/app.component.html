<div class="h-screen w-screen flex flex-col overflow-hidden bg-[#060a13] font-sans text-slate-100 select-none relative">
  
  <!-- Shared Top Header -->
  <header class="h-16 shrink-0 bg-slate-950/40 backdrop-blur-md border-b border-slate-200/5 px-6 flex items-center justify-between z-30 select-none">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-blue-600 to-cyan-500 flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.45)]">
        <span class="font-black text-sm tracking-tight text-white font-title">A</span>
      </div>
      <div>
        <h1 class="text-sm font-bold tracking-wider uppercase font-title flex items-center gap-1.5 leading-none text-slate-100">
          AURA <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></span>
        </h1>
        <span class="text-[9px] uppercase font-bold text-slate-500 tracking-widest mt-0.5 block">
          Multi-Layer Architecture Canvas
        </span>
      </div>
    </div>

    <!-- Active environment variables badge display (Only visible in Leaf View) -->
    @if (store.activeProfile() && isLeafView()) {
      <div class="hidden md:flex items-center gap-2 select-none">
        <div class="text-[10px] uppercase font-bold text-slate-500 tracking-wider">
          Active Environment Specs:
        </div>
        <div class="flex items-center gap-1.5 bg-slate-900/50 border border-slate-800 rounded-lg px-2.5 py-1 text-[10px] font-mono text-slate-400">
          <span class="text-cyan-400 font-bold">K8s Cluster:</span>
          <span>{{ store.activeProfile()?.props?.['k8s_cluster'] }}</span>
        </div>
        <div class="flex items-center gap-1.5 bg-slate-900/50 border border-slate-800 rounded-lg px-2.5 py-1 text-[10px] font-mono text-slate-400">
          <span class="text-emerald-400 font-bold">DB Host:</span>
          <span>{{ store.activeProfile()?.props?.['db_host'] || 'external-gateway' }}</span>
        </div>
      </div>
    }

    <!-- External Version Badge -->
    <div class="flex items-center gap-3 select-none">
      <div class="text-[10px] font-bold text-slate-500 bg-slate-900/40 border border-slate-800/80 px-2 py-1 rounded-md uppercase tracking-widest">
        v2026.1
      </div>
    </div>
  </header>

  <!-- Router Viewport for Index & Leaf Views -->
  <div class="flex-1 flex relative overflow-hidden select-none">
    <router-outlet></router-outlet>
  </div>
</div>
