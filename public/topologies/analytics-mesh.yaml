version: "2026.1"

types:
  components:
    domain:
      icon: "layout"
      css: { "border-color": "var(--color-domain)", "background-color": "rgba(59, 130, 246, 0.03)" }
    springboot:
      icon: "cpu"
      css: { "border-color": "var(--color-microservice)", "background-color": "rgba(6, 182, 212, 0.05)" }
    kafka:
      icon: "message-square"
      css: { "border-color": "var(--color-subnet)", "background-color": "rgba(139, 92, 246, 0.05)" }
    aurora:
      icon: "database"
      css: { "border-color": "var(--color-database)", "background-color": "rgba(16, 185, 129, 0.05)" }
    schema:
      icon: "layers"
      css: { "border-color": "var(--color-domain)", "background-color": "rgba(59, 130, 246, 0.03)" }
    table:
      icon: "table"
      css: { "border-color": "var(--color-gateway)", "background-color": "rgba(236, 72, 153, 0.05)" }
    lambda:
      icon: "zap"
      css: { "border-color": "var(--color-gateway)", "background-color": "rgba(236, 72, 153, 0.05)" }
    eventbridge:
      icon: "zap"
      css: { "border-color": "var(--color-gateway)", "background-color": "rgba(236, 72, 153, 0.03)" }
    bucket:
      icon: "archive"
      css: { "border-color": "var(--color-bucket)", "background-color": "rgba(245, 158, 11, 0.05)" }
    folder:
      icon: "folder"
      css: { "border-color": "var(--color-bucket)", "background-color": "rgba(245, 158, 11, 0.03)" }
    connector:
      icon: "message-square"
      css: { "border-color": "var(--color-microservice)", "background-color": "rgba(6, 182, 212, 0.03)" }
    opensearch:
      icon: "search"
      css: { "border-color": "var(--color-database)", "background-color": "rgba(16, 185, 129, 0.05)" }
  edges:
    async:
      css: { "stroke": "var(--color-microservice)", "stroke-width": "2", "stroke-dasharray": "6,6", "animation": "flow-dash 1.5s linear infinite" }
    sync:
      css: { "stroke": "var(--color-domain)", "stroke-width": "2.5" }
    db_flow:
      css: { "stroke": "var(--color-database)", "stroke-width": "2", "stroke-dasharray": "4,4", "animation": "flow-dash 0.8s linear infinite" }

hierarchies:
  - id: "event_analytics"
    name: "Event-Driven Analytics Mesh"
    default_profile: "prod"
    layers: ["domain", "springboot", "kafka", "aurora", "schema", "table", "lambda", "eventbridge", "bucket", "folder", "connector", "opensearch"]
    profiles:
      - id: "prod"
        props:
          env: "PROD"
          k8s_cluster: "us-east-1-telemetry"
          gitlab_base: "https://gitlab.com/enterprise/analytics-mesh"
          db_host: "prod-aurora-postgres-cluster.internal"
          bucket_name: "prod-datalake-bucket-us-east-1"
          opensearch_host: "prod-opensearch.internal"
      - id: "staging"
        props:
          env: "STAGING"
          k8s_cluster: "us-west-2-telemetry-stage"
          gitlab_base: "https://gitlab.com/enterprise/analytics-mesh-stage"
          db_host: "staging-aurora-postgres.internal"
          bucket_name: "staging-datalake-bucket-us-west-2"
          opensearch_host: "staging-opensearch.internal"
    tree:
      # S3 Bucket encapsulating folders which encapsulate data objects
      - id: "datalake-bucket"
        type: "bucket"
        children: ["raw-stage-folder", "processed-stage-folder"]
      - id: "raw-stage-folder"
        type: "folder"
        children: ["raw-telemetry-object"]
      - id: "processed-stage-folder"
        type: "folder"
        children: ["enriched-analytics-object"]
      
      # Aurora DB encapsulating multiple schemas, which encapsulate their respective tables
      - id: "aurora-cluster"
        type: "aurora"
        children: ["billing-schema", "ledger-schema"]
      - id: "billing-schema"
        type: "schema"
        children: ["invoices-table"]
      - id: "ledger-schema"
        type: "schema"
        children: ["ledger-table"]

      # Spring Boot microservices
      - id: "ingest-service"
        type: "springboot"
      - id: "analytics-engine"
        type: "springboot"
      - id: "reporting-service"
        type: "springboot"

      # Kafka Topics
      - id: "telemetry-raw-topic"
        type: "kafka"
      - id: "payment-events-topic"
        type: "kafka"
      - id: "analytics-enriched-topic"
        type: "kafka"

      # AWS Serverless triggers & executors
      - id: "eventbridge-bus"
        type: "eventbridge"
      - id: "ingest-lambda"
        type: "lambda"

      # Apache Iceberg Tables
      - id: "analytics-iceberg-table"
        type: "table"

      # ActiveMQ Sink Connector
      - id: "mq-sink-connector"
        type: "connector"

      # OpenSearch Cluster
      - id: "opensearch-cluster"
        type: "opensearch"

components:
  # Spring Boot microservices
  - id: "ingest-service"
    type: "springboot"
    name: "Ingestion API Processor (${env})"
    description: "Receives raw user metrics and publishes parallel streams to Kafka raw and payment status topics."
    docs: "/docs/order-api.md"
    links:
      - { type: "gitlab", url: "${gitlab_base}/ingestion-api" }
      - { type: "confluence", url: "https://confluence.enterprise.com/display/TELEMETRY/Ingestion+API+Processor" }
    ports: ["in", "out"]

  - id: "analytics-engine"
    type: "springboot"
    name: "Ingest & Metrics Aggregator (${env})"
    description: "Runs two ingestions: persists raw telemetry to billing invoices, and aggregates multi-schema database states."
    docs: "/docs/order-api.md"
    links:
      - { type: "gitlab", url: "${gitlab_base}/analytics-engine" }
      - { type: "confluence", url: "https://confluence.enterprise.com/display/TELEMETRY/Ingest+and+Metrics+Aggregator" }
    ports: ["in", "out"]

  - id: "reporting-service"
    type: "springboot"
    name: "BI Reporting Hub (${env})"
    description: "Consumes real-time enriched streams and serves dynamic graphical analytics dashboards to end-users."
    docs: "/docs/order-api.md"
    links:
      - { type: "gitlab", url: "${gitlab_base}/reporting-hub" }
      - { type: "confluence", url: "https://confluence.enterprise.com/display/TELEMETRY/BI+Reporting+Hub" }
    ports: ["in", "out"]

  # Kafka Topics
  - id: "telemetry-raw-topic"
    type: "kafka"
    name: "kafka: telemetry.raw.events"
    description: "Ingestion pipeline queue containing raw telemetry reports and page tracking logs."
    docs: "/docs/order-api.md"
    ports: ["in", "out"]

  - id: "payment-events-topic"
    type: "kafka"
    name: "kafka: payment.status.events"
    description: "Transactional messaging topic recording real-time client Stripe purchase checkouts."
    docs: "/docs/order-api.md"
    ports: ["in", "out"]

  - id: "analytics-enriched-topic"
    type: "kafka"
    name: "kafka: analytics.enriched.events"
    description: "Highly enriched data pipeline containing compiled multi-schema telemetry aggregates."
    docs: "/docs/order-api.md"
    ports: ["in", "out"]

  # Aurora DB (with multi-schema and table encapsulation)
  - id: "aurora-cluster"
    type: "aurora"
    name: "Aurora PostgreSQL DB Cluster (${db_host})"
    description: "Multi-AZ transactional relational engine containing segregated billing and general ledger schemas."
    docs: "/docs/order-db.md"
    ports: ["in", "out"]

  - id: "billing-schema"
    type: "schema"
    name: "Schema: billing_schema"
    description: "Logical database partition isolating receipt indexes, invoicing details, and payments."
    docs: "/docs/ordering-domain.md"
    ports: ["in", "out"]

  - id: "invoices-table"
    type: "table"
    name: "Table: invoices_t"
    description: "Stores invoicing states. Written by Ingestion 1, read by Ingestion 2."
    docs: "/docs/order-db.md"
    ports: ["in", "out"]

  - id: "ledger-schema"
    type: "schema"
    name: "Schema: ledger_schema"
    description: "Logical database partition containing financial ledgers, audit registers, and journal trails."
    docs: "/docs/ordering-domain.md"
    ports: ["in", "out"]

  - id: "ledger-table"
    type: "table"
    name: "Table: ledger_t"
    description: "Financial ledger catalog. Written by serverless AWS Lambdas, read by Ingestion 2."
    docs: "/docs/order-db.md"
    ports: ["in", "out"]

  # AWS Lambda & EventBridge
  - id: "eventbridge-bus"
    type: "eventbridge"
    name: "EventBridge Event Bus Trigger"
    description: "AWS cloud event bus orchestrating event routing for serverless SaaS states."
    docs: "/docs/payment-gateway.md"
    ports: ["out"]

  - id: "ingest-lambda"
    type: "lambda"
    name: "Ledger Ingest Lambda"
    description: "Serverless lambda executing upon state triggers and writing audit entries directly to Aurora databases."
    docs: "/docs/payment-gateway.md"
    ports: ["in", "out"]

  # S3 Buckets and Folders
  - id: "datalake-bucket"
    type: "bucket"
    name: "S3 Bucket: datalake-s3 (${bucket_name})"
    description: "Enterprise S3 object storage serving as the target backup directory for auditing logs."
    docs: "/docs/order-api.md"
    ports: ["in", "out"]

  - id: "raw-stage-folder"
    type: "folder"
    name: "Folder: /raw-stage/"
    description: "Datalake staging subdirectory storing raw, partition-separated serverless log files."
    docs: "/docs/ordering-domain.md"
    ports: ["in", "out"]

  - id: "processed-stage-folder"
    type: "folder"
    name: "Folder: /processed-stage/"
    description: "Optimized staging partition hosting clean, schema-enforced parquet files generated by stream processors."
    docs: "/docs/ordering-domain.md"
    ports: ["in", "out"]

  - id: "raw-telemetry-object"
    type: "table"
    name: "File: telemetry_raw.csv"
    description: "CSV backups containing timestamped telemetry dumps generated by serverless ingest executors."
    docs: "/docs/order-db.md"
    ports: ["in", "out"]

  - id: "enriched-analytics-object"
    type: "table"
    name: "File: analytics_enriched.parquet"
    description: "Compressed column-oriented parquet chunks with unified schemas for fast analytical queries."
    docs: "/docs/order-db.md"
    ports: ["in", "out"]

  # Apache Iceberg Table
  - id: "analytics-iceberg-table"
    type: "table"
    name: "Iceberg Table: analytics_summary"
    description: "High-performance tabular catalog over S3 parquets supporting time travel queries and ACID transactions."
    docs: "/docs/order-db.md"
    ports: ["in"]

  # MQ Connector
  - id: "mq-sink-connector"
    type: "connector"
    name: "ActiveMQ Sink Connector"
    description: "Active MQ connector bridging enriched analytical event topics out to downstream client brokers."
    docs: "/docs/payment-gateway.md"
    ports: ["in", "out"]

  # OpenSearch Server
  - id: "opensearch-cluster"
    type: "opensearch"
    name: "OpenSearch Cluster (${opensearch_host})"
    description: "Dynamic indexing search cluster used to parse enriched analytic logs for metrics graphing."
    docs: "/docs/order-api.md"
    ports: ["in"]

edges:
  # EventBridge trigger fires Lambda, which writes to ledger table and S3 Data Lake
  - from: "eventbridge-bus:out"
    to: "ingest-lambda:in"
    type: "sync"
  - from: "ingest-lambda:out"
    to: "ledger-table:in"
    type: "db_flow"
  - from: "ingest-lambda:out"
    to: "raw-telemetry-object:in"
    type: "async"

  # First microservice Ingestion Processor publishes streams to raw and payment topics
  - from: "ingest-service:out"
    to: "telemetry-raw-topic:in"
    type: "async"
  - from: "ingest-service:out"
    to: "payment-events-topic:in"
    type: "async"

  # Middle Service Ingestion 1: reads raw topic and writes to invoices table
  - from: "telemetry-raw-topic:out"
    to: "analytics-engine:in"
    type: "sync"
  - from: "analytics-engine:out"
    to: "invoices-table:in"
    type: "db_flow"

  # Middle Service Ingestion 2: consumes payment topic, reads invoices table, reads ledger table, and writes to enriched topic
  - from: "payment-events-topic:out"
    to: "analytics-engine:in"
    type: "sync"
  - from: "invoices-table:out"
    to: "analytics-engine:in"
    type: "db_flow"
  - from: "ledger-table:out"
    to: "analytics-engine:in"
    type: "db_flow"
  - from: "analytics-engine:out"
    to: "analytics-enriched-topic:in"
    type: "async"

  # Third microservice Reporting Hub consumes enriched topic
  - from: "analytics-enriched-topic:out"
    to: "reporting-service:in"
    type: "sync"

  # Downstream logging indexes and MQ connector integrations
  - from: "analytics-enriched-topic:out"
    to: "opensearch-cluster:in"
    type: "async"
  - from: "analytics-enriched-topic:out"
    to: "mq-sink-connector:in"
    type: "async"
